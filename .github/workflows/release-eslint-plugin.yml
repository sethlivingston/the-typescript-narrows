name: Release ESLint Plugin

on:
  push:
    tags: ['eslint-plugin/v*']

concurrency:
  group: release-eslint-plugin-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        working-directory: eslint-plugin
        run: npm ci

      - name: Build
        working-directory: eslint-plugin
        run: npm run build

      - name: Test
        working-directory: eslint-plugin
        run: npm test

      - name: Typecheck
        working-directory: eslint-plugin
        run: npm run typecheck

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        working-directory: eslint-plugin
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#eslint-plugin/v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        working-directory: eslint-plugin
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Build
        working-directory: eslint-plugin
        run: npm run build

      - name: Publish to npm
        working-directory: eslint-plugin
        run: npm publish --access public --provenance --ignore-scripts

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag -l 'eslint-plugin/v*' --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          NOTES=$(git log "$RANGE" --pretty=format:"- %s" -- eslint-plugin/ docs/opinions/)
          if [ -z "$NOTES" ]; then
            NOTES="- Maintenance release (no user-facing changes)"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "ESLint Plugin v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
