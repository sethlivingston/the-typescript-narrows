name: CI ESLint Plugin

on:
  pull_request:
    paths:
      - 'eslint-plugin/**'
      - '.github/workflows/ci-eslint-plugin.yml'
  push:
    branches: [main]
    paths:
      - 'eslint-plugin/**'
      - '.github/workflows/ci-eslint-plugin.yml'

concurrency:
  group: ci-eslint-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          cache: npm
          node-version: '24'

      - name: Install dependencies
        working-directory: eslint-plugin
        run: npm ci

      - name: Verify package
        working-directory: eslint-plugin
        run: npm run verify
